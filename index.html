<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ------------------- RESET ------------------- */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html,body{
height:100%;
}

/* ------------------- BODY ------------------- */
body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#020202;
color:white;
overflow:hidden;
padding:20px;
}

/* ------------------- ANIMATED BACKGROUND ------------------- */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
}

.bg span{
position:absolute;
display:block;
width:20px;
height:20px;
background:rgba(0,255,255,0.08);
animation:animate 25s linear infinite;
bottom:-150px;
border-radius:50%;
}

/* multiple particles */
.bg span:nth-child(1){left:10%; animation-delay:0s;}
.bg span:nth-child(2){left:20%; animation-delay:2s;}
.bg span:nth-child(3){left:30%; animation-delay:4s;}
.bg span:nth-child(4){left:40%; animation-delay:0s;}
.bg span:nth-child(5){left:50%; animation-delay:3s;}
.bg span:nth-child(6){left:60%; animation-delay:6s;}
.bg span:nth-child(7){left:70%; animation-delay:1s;}
.bg span:nth-child(8){left:80%; animation-delay:5s;}
.bg span:nth-child(9){left:90%; animation-delay:2s;}
.bg span:nth-child(10){left:15%; animation-delay:7s;}

@keyframes animate{
0%{
transform:translateY(0) scale(0);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-1000px) scale(1);
opacity:0;
}
}

/* ------------------- CARD ------------------- */
.card{
position:relative;
width:100%;
max-width:700px;
padding:50px;
background:rgba(255,255,255,0.05);
border-radius:20px;
backdrop-filter:blur(12px);
box-shadow:0 0 60px rgba(0,255,255,0.1);
text-align:center;
transition:.4s ease;
}

.card:hover{
box-shadow:0 0 80px rgba(0,255,255,0.2);
}

/* ------------------- HEADING ------------------- */
.heading{
font-size:3rem;
font-weight:700;
letter-spacing:2px;
background:linear-gradient(
90deg,
#00fff7,
#ff00e0,
#00c3ff,
#00fff7
);
background-size:300%;
-webkit-background-clip:text;
color:transparent;
animation:gradientMove 6s linear infinite;
}

@keyframes gradientMove{
0%{background-position:0%}
100%{background-position:300%}
}

/* ------------------- SUBTITLE ------------------- */
.subtitle{
margin-top:15px;
font-size:1rem;
opacity:.7;
letter-spacing:1px;
}

/* ------------------- DIVIDER ------------------- */
.divider{
width:60px;
height:3px;
margin:25px auto;
background:linear-gradient(90deg,#00fff7,#ff00e0);
border-radius:10px;
}

/* ------------------- RESPONSIVE ------------------- */
@media(max-width:1024px){
.heading{
font-size:2.5rem;
}
}

@media(max-width:768px){
.card{
padding:35px;
}
.heading{
font-size:2rem;
}
}

@media(max-width:480px){
.card{
padding:25px;
border-radius:15px;
}
.heading{
font-size:1.6rem;
}
.subtitle{
font-size:.9rem;
}
}

/* more smooth transitions */
.card,
.heading,
.subtitle{
transition:all .3s ease;
}

</style>
</head>

<body>

<!-- background particles -->
<div class="bg">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>

<!-- main card -->
<div class="card">

<div class="heading">🚀 WEBSITE COMING SOON</div>

<div class="subtitle">
Something big is on the way
</div>

<div class="divider"></div>

<!-- animated text lines -->
<div class="text-wrap">

<div class="line line1">We are building something amazing</div>
<div class="line line2">Smooth. Fast. Modern.</div>
<div class="line line3">Launching very soon</div>

</div>

<!-- loader -->
<div class="loader"></div>

<!-- wait text -->
<div class="wait-text">Please Wait...</div>

<!-- notify button -->
<button class="notify-btn" onclick="subscribe()">
🔔 Notify Me When Live
</button>

</div> <!-- card close -->

<style>

/* ---------------- TEXT ANIMATION ---------------- */
.text-wrap{
margin-top:10px;
}

.line{
opacity:0;
transform:translateY(15px);
animation:fadeUp 1s forwards;
}

.line1{animation-delay:.5s;}
.line2{animation-delay:1s;}
.line3{animation-delay:1.5s;}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

/* ---------------- LOADER ---------------- */
.loader{
margin:35px auto;
width:70px;
height:70px;
border-radius:50%;
border:3px solid transparent;
border-top:3px solid #00fff7;
border-right:3px solid #ff00e0;
border-bottom:3px solid #00c3ff;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* ---------------- WAIT TEXT ---------------- */
.wait-text{
margin-top:10px;
letter-spacing:2px;
opacity:.7;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:.3}
50%{opacity:1}
100%{opacity:.3}
}

/* ---------------- BUTTON ---------------- */
.notify-btn{
margin-top:25px;
padding:14px 30px;
border:none;
border-radius:40px;
background:linear-gradient(90deg,#00fff7,#ff00e0);
color:white;
font-weight:600;
cursor:pointer;
transition:.3s;
font-size:14px;
}

.notify-btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(255,0,224,.5);
}

/* ---------------- RESPONSIVE ---------------- */
@media(max-width:768px){
.loader{
width:55px;
height:55px;
}
.notify-btn{
padding:12px 24px;
}
}

</style>

<!-- OneSignal -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

  });
});

function subscribe(){
OneSignal.showSlidedownPrompt();
}
</script>

</body>
</html>
